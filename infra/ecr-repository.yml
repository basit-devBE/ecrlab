AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECR Repository for Abdul Mohammed's Spring Boot Docker Lab.
  Creates a private ECR repo with image scanning, lifecycle policy,
  encryption at rest, and a repository policy enforcing HTTPS.

Parameters:
  RepositoryName:
    Type: String
    Default: abdulmohammed-springboot
    Description: ECR repository name

  StudentName:
    Type: String
    Default: Abdul Mohammed
    Description: Student name used for tagging

  ProjectTag:
    Type: String
    Default: ecr-springboot-lab
    Description: Tag applied to all resources for cost tracking

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName

      # MUTABLE allows the same tag (abdulmohammed_springboot) to be
      # overwritten on every CI push — appropriate for a lab environment.
      ImageTagMutability: MUTABLE

      # Scan every pushed image for OS and package CVEs at no extra cost.
      ImageScanningConfiguration:
        ScanOnPush: true

      EncryptionConfiguration:
        EncryptionType: AES256

      LifecyclePolicyText: !Sub |
        {
          "rules": [
            {
              "rulePriority": 1,
              "description": "Remove untagged images after 1 day",
              "selection": {
                "tagStatus": "untagged",
                "countType": "sinceImagePushed",
                "countUnit": "days",
                "countNumber": 1
              },
              "action": { "type": "expire" }
            },
            {
              "rulePriority": 2,
              "description": "Keep only the last 5 tagged images",
              "selection": {
                "tagStatus": "tagged",
                "tagPrefixList": ["abdulmohammed"],
                "countType": "imageCountMoreThan",
                "countNumber": 5
              },
              "action": { "type": "expire" }
            }
          ]
        }

      RepositoryPolicyText:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "ecr:*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "ecr:GetDownloadUrlForLayer"
              - "ecr:BatchGetImage"
              - "ecr:BatchCheckLayerAvailability"
              - "ecr:PutImage"
              - "ecr:InitiateLayerUpload"
              - "ecr:UploadLayerPart"
              - "ecr:CompleteLayerUpload"
              - "ecr:DescribeRepositories"
              - "ecr:GetRepositoryPolicy"

      Tags:
        - Key: Name
          Value: !Sub "${ProjectTag}-ecr-repo"
        - Key: Student
          Value: !Ref StudentName
        - Key: Project
          Value: !Ref ProjectTag
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RepositoryUri:
    Description: Full ECR URI — use in the GitHub Actions workflow
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${RepositoryName}"
    Export:
      Name: !Sub "${ProjectTag}-ecr-uri"

  RepositoryArn:
    Description: ECR repository ARN — used in the IAM role resource condition
    Value: !GetAtt ECRRepository.Arn
    Export:
      Name: !Sub "${ProjectTag}-ecr-arn"
