AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub OIDC Identity Provider and IAM role for Abdul Mohammed's ECR lab.
  Allows GitHub Actions to push Docker images to ECR without storing any
  long-lived AWS credentials in GitHub.

  IMPORTANT — deploy order:
    1. infra/ecr-repository.yml  (this stack imports its ECR ARN output)
    2. infra/github-oidc-role.yml  (this stack)

  IMPORTANT — the OIDC provider is a global IAM resource, not per-region:
    If it's already registered in this account (e.g. from a stack deployed
    in another region), set CreateOIDCProvider to "false" and pass its ARN
    via ExistingOIDCProviderArn instead of creating a duplicate.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub username or organisation (e.g. abdulmohammed)

  GitHubRepo:
    Type: String
    Description: GitHub repository name (e.g. awsLabs)

  ProjectTag:
    Type: String
    Default: ecr-springboot-lab

  CreateOIDCProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      Set to "false" if the GitHub OIDC provider is already registered in
      this account (it's a global resource — only needs to exist once,
      regardless of how many regions have a role stack).

  ExistingOIDCProviderArn:
    Type: String
    Default: ""
    Description: >
      Required when CreateOIDCProvider is "false". ARN of the existing
      provider, e.g.
      arn:aws:iam::YOUR_ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, "true"]

Resources:

  # ---------------------------------------------------------------
  # GitHub OIDC Identity Provider
  # Registers GitHub as a trusted token issuer in this AWS account.
  # Global resource — only created when CreateOIDCProvider is "true".
  # ---------------------------------------------------------------
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # ---------------------------------------------------------------
  # IAM Role — assumed by GitHub Actions via OIDC
  # RoleName includes the region: IAM roles are global, and a second
  # region's stack (e.g. for a relocated ECR repo) must not collide
  # with a role already created by a stack in another region.
  # ---------------------------------------------------------------
  GitHubActionsECRRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectTag}-github-actions-ecr-role-${AWS::Region}"
      Description: >
        Assumed by GitHub Actions via OIDC. Grants least-privilege
        permissions to push Docker images to the ECR repository.

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDCProvider
                - !GetAtt GitHubOIDCProvider.Arn
                - !Ref ExistingOIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                # Prevents other AWS customers using GitHub OIDC from
                # assuming this role (confused deputy protection).
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
              StringLike:
                # Restricts assumption to your specific repo on any branch/event.
                # Tighten to :ref:refs/heads/main to allow only the main branch.
                "token.actions.githubusercontent.com:sub":
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"

      Policies:
        - PolicyName: ECRPushPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # GetAuthorizationToken is account-level — cannot be scoped to a repo.
              - Sid: AllowECRAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"

              # All push actions are scoped to the specific ECR repository only.
              - Sid: AllowECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                Resource:
                  Fn::ImportValue: !Sub "${ProjectTag}-ecr-arn"

      MaxSessionDuration: 3600

      Tags:
        - Key: Name
          Value: !Sub "${ProjectTag}-github-actions-role-${AWS::Region}"
        - Key: Project
          Value: !Ref ProjectTag
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: >
      IAM Role ARN — set this as the AWS_ROLE_ARN repository variable
      in GitHub (Settings > Secrets and variables > Actions > Variables).
    Value: !GetAtt GitHubActionsECRRole.Arn
    Export:
      Name: !Sub "${ProjectTag}-github-actions-role-arn"
